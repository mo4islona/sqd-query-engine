name: solana

tables:
  blocks:
    block_number_column: number
    field_name: block
    sort_key: [number]
    columns:
      number:
        type: uint64
        stats: true
      hash:
        type: string
        encoding: base58
      parent_number:
        type: uint64
      parent_hash:
        type: string
        encoding: base58
      height:
        type: uint64
      timestamp:
        type: timestamp_second

  transactions:
    block_number_column: block_number
    query_name: transactions
    field_name: transaction
    item_order_keys: [transaction_index]
    sort_key: [fee_payer, block_number, transaction_index]
    children: [logs, balances, token_balances]
    parent_key: [block_number, transaction_index]
    relations:
      instructions:
        table: instructions
        key: [block_number, transaction_index]
      logs:
        table: logs
        key: [block_number, transaction_index]
      balances:
        table: balances
        key: [block_number, transaction_index]
      token_balances:
        table: token_balances
        key: [block_number, transaction_index]
    special_filters:
      mentions_account:
        type: bloom_filter
        column: accounts_bloom
        num_bytes: 64
        num_hashes: 7
    columns:
      block_number:
        type: uint64
        stats: true
      transaction_index:
        type: uint32
      version:
        type: int16
      account_keys:
        type: list_string
        dictionary: true
      address_table_lookups:
        type: list_struct
      num_readonly_signed_accounts:
        type: uint8
      num_readonly_unsigned_accounts:
        type: uint8
      num_required_signatures:
        type: uint8
      recent_blockhash:
        type: string
        encoding: base58
      signatures:
        type: list_string
      err:
        type: string
        encoding: json
      compute_units_consumed:
        type: uint64
      cost_units:
        type: uint64
      fee:
        type: uint64
      loaded_addresses:
        type: struct
      has_dropped_log_messages:
        type: boolean
      fee_payer:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      account_keys_size:
        type: uint64
      address_table_lookups_size:
        type: uint64
      signatures_size:
        type: uint64
      loaded_addresses_size:
        type: uint64
      accounts_bloom:
        type: fixed_binary_64
    output_encodings:
      version: solana_tx_version
      err: json
      fee: bignum
      compute_units_consumed: bignum
    weight_columns:
      account_keys: account_keys_size
      address_table_lookups: address_table_lookups_size
      signatures: signatures_size
      loaded_addresses: loaded_addresses_size

  instructions:
    block_number_column: block_number
    address_column: instruction_address
    query_name: instructions
    field_name: instruction
    item_order_keys: [transaction_index, instruction_address]
    sort_key: [program_id, d1, b9, block_number, transaction_index]
    relations:
      transaction:
        table: transactions
        key: [block_number, transaction_index]
      transaction_balances:
        table: balances
        key: [block_number, transaction_index]
      transaction_token_balances:
        table: token_balances
        key: [block_number, transaction_index]
      transaction_instructions:
        table: instructions
        key: [block_number, transaction_index]
      inner_instructions:
        table: instructions
        kind: children
        key: [block_number, transaction_index, instruction_address]
      parent_instructions:
        table: instructions
        kind: parents
        key: [block_number, transaction_index, instruction_address]
      logs:
        table: logs
        key: [block_number, transaction_index, instruction_address]
    special_filters:
      discriminator:
        type: discriminator
        columns:
          "1": d1
          "2": d2
          "3": d3
          "4": d4
          "5": d5
          "6": d6
          "7": d7
          "8": d8
          "9": d9
          "10": d10
          "11": d11
          "12": d12
          "13": d13
          "14": d14
          "15": d15
          "16": d16
      mentions_account:
        type: bloom_filter
        column: accounts_bloom
        num_bytes: 64
        num_hashes: 7
    columns:
      block_number:
        type: uint64
        stats: true
      transaction_index:
        type: uint32
      instruction_address:
        type: list_uint32
      program_id:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      data:
        type: string
        encoding: base58
      a0:
        type: string
        encoding: base58
        dictionary: true
      a1:
        type: string
        encoding: base58
        dictionary: true
      a2:
        type: string
        encoding: base58
        dictionary: true
      a3:
        type: string
        encoding: base58
        dictionary: true
      a4:
        type: string
        encoding: base58
        dictionary: true
      a5:
        type: string
        encoding: base58
        dictionary: true
      a6:
        type: string
        encoding: base58
        dictionary: true
      a7:
        type: string
        encoding: base58
      a8:
        type: string
        encoding: base58
        dictionary: true
      a9:
        type: string
        encoding: base58
        dictionary: true
      a10:
        type: string
        encoding: base58
        dictionary: true
      a11:
        type: string
        encoding: base58
        dictionary: true
      a12:
        type: string
        encoding: base58
        dictionary: true
      a13:
        type: string
        encoding: base58
        dictionary: true
      a14:
        type: string
        encoding: base58
        dictionary: true
      a15:
        type: string
        encoding: base58
        dictionary: true
      rest_accounts:
        type: list_string
        dictionary: true
      accounts_bloom:
        type: fixed_binary_64
      compute_units_consumed:
        type: uint64
      error:
        type: string
      is_committed:
        type: boolean
      has_dropped_log_messages:
        type: boolean
      d1:
        type: uint8
        stats: true
      d2:
        type: uint16
        stats: true
      d3:
        type: fixed_binary_3
        stats: true
      d4:
        type: uint32
        stats: true
      d5:
        type: fixed_binary_5
        stats: true
      d6:
        type: fixed_binary_6
        stats: true
      d7:
        type: fixed_binary_7
        stats: true
      d8:
        type: uint64
        stats: true
      d9:
        type: fixed_binary_9
        stats: true
      d10:
        type: fixed_binary_10
        stats: true
      d11:
        type: fixed_binary_11
        stats: true
      d12:
        type: fixed_binary_12
        stats: true
      d13:
        type: fixed_binary_13
        stats: true
      d14:
        type: fixed_binary_14
        stats: true
      d15:
        type: fixed_binary_15
        stats: true
      d16:
        type: fixed_binary_16
        stats: true
      b9:
        type: uint8
      accounts_size:
        type: uint64
      data_size:
        type: uint64
    output_encodings:
      compute_units_consumed: bignum
    virtual_fields:
      accounts:
        type: roll
        columns: [a0, a1, a2, a3, a4, a5, a6, a7, a8, a9, a10, a11, a12, a13, a14, a15, rest_accounts]
    weight_columns:
      data: data_size
      a0: accounts_size
      a1: 0
      a2: 0
      a3: 0
      a4: 0
      a5: 0
      a6: 0
      a7: 0
      a8: 0
      a9: 0
      a10: 0
      a11: 0
      a12: 0
      a13: 0
      a14: 0
      a15: 0
      rest_accounts: 0

  logs:
    block_number_column: block_number
    query_name: logs
    field_name: log
    item_order_keys: [transaction_index, log_index]
    sort_key: [program_id, block_number, transaction_index, log_index]
    relations:
      transaction:
        table: transactions
        key: [block_number, transaction_index]
      instruction:
        table: instructions
        key: [block_number, transaction_index, instruction_address]
        left_key: [block_number, transaction_index, instruction_address]
        right_key: [block_number, transaction_index, instruction_address]
    columns:
      block_number:
        type: uint64
        stats: true
      transaction_index:
        type: uint32
      log_index:
        type: uint32
      instruction_address:
        type: list_uint32
      program_id:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      kind:
        type: string
        dictionary: true
      message:
        type: string
      message_size:
        type: uint64
    weight_columns:
      message: message_size

  balances:
    block_number_column: block_number
    query_name: balances
    field_name: balance
    item_order_keys: [transaction_index, account]
    sort_key: [account, block_number, transaction_index]
    relations:
      transaction:
        table: transactions
        key: [block_number, transaction_index]
      transaction_instructions:
        table: instructions
        key: [block_number, transaction_index]
    columns:
      block_number:
        type: uint64
        stats: true
      transaction_index:
        type: uint32
      account:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      pre:
        type: uint64
      post:
        type: uint64
    output_encodings:
      pre: bignum
      post: bignum

  token_balances:
    block_number_column: block_number
    query_name: tokenBalances
    field_name: tokenBalance
    item_order_keys: [transaction_index, account]
    sort_key: [post_program_id, post_mint, account, block_number, transaction_index]
    relations:
      transaction:
        table: transactions
        key: [block_number, transaction_index]
      transaction_instructions:
        table: instructions
        key: [block_number, transaction_index]
      transaction_balances:
        table: balances
        key: [block_number, transaction_index]
      transaction_token_balances:
        table: token_balances
        key: [block_number, transaction_index]
    columns:
      block_number:
        type: uint64
        stats: true
      transaction_index:
        type: uint32
      account:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      pre_mint:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      post_mint:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      pre_decimals:
        type: uint16
      post_decimals:
        type: uint16
      pre_program_id:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      post_program_id:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      pre_owner:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      post_owner:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      pre_amount:
        type: uint64
      post_amount:
        type: uint64
    output_encodings:
      pre_amount: bignum
      post_amount: bignum

  rewards:
    block_number_column: block_number
    query_name: rewards
    field_name: reward
    item_order_keys: [pubkey, reward_type]
    sort_key: [pubkey, block_number]
    columns:
      block_number:
        type: uint64
      pubkey:
        type: string
        encoding: base58
        stats: true
        dictionary: true
      lamports:
        type: int64
      post_balance:
        type: uint64
      reward_type:
        type: string
        dictionary: true
      commission:
        type: uint8
    output_encodings:
      lamports: bignum
      post_balance: bignum
